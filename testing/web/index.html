<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Style Converter - Web Testing</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: #111;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        color: #eee;
        overflow: hidden;
      }
      body {
        display: flex;
        justify-content: center;
        padding-top: 20px;
      }
      #root {
        width: 390px;
        max-width: 390px;
        min-width: 390px;
        height: 844px;
        overflow-y: auto;
        overflow-x: hidden;
        background: #1a1a2e;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
