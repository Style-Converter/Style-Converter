# XcodeGen config — generates StyleConverterTest.xcodeproj from this file.
#
# Regenerate the project:
#     cd testing/iOS && xcodegen generate
#
# Install XcodeGen if missing:
#     brew install xcodegen

name: StyleConverterTest
options:
  bundleIdPrefix: com.styleconverter
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  StyleConverterTest:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: StyleConverterTest
        excludes:
          - "Info.plist"
    resources:
      - StyleConverterTest/Resources
      - StyleConverterTest/Assets.xcassets
    info:
      path: StyleConverterTest/Info.plist
      properties:
        CFBundleDisplayName: Style Converter
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.styleconverter.test
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
